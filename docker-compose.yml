version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: book_screen_explorer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: book_screen_explorer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d book_screen_explorer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
