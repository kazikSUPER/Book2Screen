services:
    db:
        image: postgres:15-alpine
        container_name: project_db
        env_file: ./.env
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASS}
            - POSTGRES_DB=${DB_NAME}
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - project_network

    backend:
        build:
            context: ./server
            dockerfile: Dockerfile
        container_name: project_backend
        env_file: ./.env
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=http://+:80
            - DB_CONNECTION_STRING=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
            - JWT_SECRET=${JWT_SECRET}
            - JWT_ISSUER=${JWT_ISSUER}
            - JWT_AUDIENCE=${JWT_AUDIENCE}
            - JWT_EXPIRY_MINUTES=${JWT_EXPIRY_MINUTES}
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 45s
        ports:
            - "5000:80"
        networks:
            - project_network

    frontend:
        build:
            context: ./ui
            dockerfile: Dockerfile
            args:
                - VITE_API_URL=${API_URL_EXTERNAL:-http://localhost:5000}
        container_name: project_frontend
        ports:
            - "3000:80"
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - project_network

    pgadmin:
        image: dpage/pgadmin4
        container_name: project_pgadmin
        environment:
            - PGADMIN_DEFAULT_EMAIL=admin@admin.com
            - PGADMIN_DEFAULT_PASSWORD=admin
        ports:
            - "5050:80"
        networks:
            - project_network

networks:
    project_network:
        driver: bridge
  